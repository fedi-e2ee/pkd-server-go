name: Unit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        db: [postgres, sqlite]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: pkd-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build
        run: go build -v ./...

      - name: Test with ${{ matrix.db }}
        run: go test -v ./...
        env:
          # DSN is only set for the postgres job. The sqlite job will use the in-memory DB.
          TEST_DATABASE_DSN: ${{ matrix.db == 'postgres' && 'postgresql://user:password@localhost:5432/pkd-test?sslmode=disable' || '' }}
