name: Startup and Config Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  integration-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        db: [postgres, sqlite]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: pkd-test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binaries
        run: |
          go build -o pkd-server ./server
          go build -o pkd-admin ./cmd

      - name: Generate config and keys
        run: |
          if [ "${{ matrix.db }}" == "sqlite" ]; then
            ./pkd-admin keygen --driver=sqlite --key-file=keys.json
          else
            ./pkd-admin keygen --driver=postgres --dsn="postgresql://user:password@localhost:5432/pkd-test?sslmode=disable" --key-file=keys.json
          fi

      - name: Configure server
        run: ./pkd-server --config config.yaml > server.log 2>&1 &

      - name: Wait for server to start
        run: |
          for i in {1..10}; do
            if curl -s http://localhost:8080; then
              echo "Server started"
              break
            fi
            sleep 1
          done
          if ! curl -s http://localhost:8080; then
            echo "Server failed to start"
            cat server.log
            exit 1
          fi

      - name: Check database driver
        run: |
          if ! grep -q "Successfully connected to the database" server.log; then
            echo "Failed to connect to the database"
            cat server.log
            exit 1
          fi
          if ! grep -q "Using database driver: ${{ matrix.db }}" server.log; then
            echo "Incorrect database driver used"
            cat server.log
            exit 1
          fi
          if [[ "${{ matrix.db }}" == "sqlite" ]]; then
            if ! grep -q "pkd.db" server.log; then
              echo "Incorrect DSN for sqlite"
              cat server.log
              exit 1
            fi
          fi
