name: Fuzzing

on:
  pull_request:
    branches: [ main ]

jobs:
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run Fuzz Tests
        run: |
          go test -fuzz=FuzzHTTPHandlers -fuzztime=10s ./tests/fuzz
          go test -fuzz=FuzzProtocolHandler -fuzztime=10s ./tests/fuzz
          go test -fuzz=FuzzGetActorKeys -fuzztime=10s ./tests/fuzz
          go test -fuzz=FuzzGetKeyInfo -fuzztime=10s ./tests/fuzz
